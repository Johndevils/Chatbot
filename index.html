<!DOCTYPE html>
  <html lang="en">
  <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width,
  initial-scale=1.0">
     <title>ChatBot Apptitle>
     <style>
          * {
              margin: 0;
              padding: 0;
              box-sizing: border-box;
              font-family: 'Segoe UI', Tahoma, Geneva,
  Verdana, sans-serif;
          }

          body {
              display: flex;
              height: 100vh;
              background: #1e1e1e;
              color: #fff;
              overflow: hidden;
          }

          .container {
              display: flex;
              margin: 0 2rem 2rem;
              width: 90%;
              max-width: 800px;
              gap: 2rem;
          }

          .chat-container {
              flex: 3;
              display: flex;
              flex-direction: column;
              height: 100%;
              overflow-y: auto;
              padding: 2rem;
              background: #2a2a2a;
              border-radius: 10px;
              position: relative;
          }

          .chat-header {
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 1.5rem;
              padding: 0 1rem;
          }

          .chat-title {
              font-size: 1.5rem;
              color: #00ffcc;
          }

          .chat-buttons {
              display: flex;
              gap: 1rem;
          }

          button {
              padding: 0.5rem 1rem;
              border: none;
              border-radius: 5px;
              cursor: pointer;
              background: #00ffcc;
              color: #1e1e1e;
              font-weight: bold;
              transition: all 0.3s;
          }

          button:hover {
              background: #00ccbb;
              box-shadow: 0 0 10px rgba(0,255,204,0.3);
          }

          .message-container {
              display: flex;
              flex-direction: column-reverse;
              gap: 1rem;
              margin-bottom: auto;
          }

          .message {
              max-width: 70%;
              padding: 1rem 1.5rem;
              border-radius: 20px;
              line-height: 1.5;
              position: relative;
          }

          .user-message {
              background: #007aff;
              align-self: flex-end;
              margin-left: auto;
          }

          .bot-message {
              background: #2c3e50;
              margin-right: auto;
          }

          .message-meta {
              margin-top: 0.5rem;
              font-size: 0.85rem;
              opacity: 0.7;
          }

          .typing-indicator {
              display: inline-block;
              width: 10px;
              height: 10px;
              border-radius: 50%;
              background: #00fff3;
              animation: typing-dots 1.5s infinite linear;
              margin-right: 5px;
          }

          @keyframes typing-dots {
              0%, 100% { transform: scale(1); }
              50% { transform: scale(0.5); }
          }

          .input-section {
              flex: 1;
              display: flex;
              flex-direction: column;
          }

          textarea {
              flex: 1;
              padding: 1rem;
              border: 1px solid #3498db;
              border-radius: 10px;
              resize: none;
              min-height: 100px;
              font-size: 1rem;
              background: #34495e;
              color: #fff;
          }

          textarea:focus {
              outline: none;
              border-color: #00ffcc;
          }

          .controls {
              display: flex;
              gap: 1rem;
              margin-top: auto;
          }

          button {
              flex: 1;
              margin: 0 0.5rem;
          }

          .controls button {
              background: #34495e;
              color: #fff;
              border: 1px solid #00ffcc;
          }

          .controls button:hover {
              background: #00ffcc;
          }
     style>
  head>
  <body>
     div class="container">
         div class="chat-container">
             div class="chat-header">
                 div class="chat-buttons">
  button onclick="clearChat()">Clear Chatbutton>
                     button onclick="startTyping()">Start
  Typingbutton>
                 div>
                 div class="chat-title">ChatBot Prodiv>
             div>
             div class="message-container"
  id="chat-messagesdiv>
         div>
         div class="input-section">
             textarea id="user-input" placeholder="Type your
  message here...textarea>
             div class="controls">
                 button id="send-btn">Sendbutton>
                 button onclick="startTyping()">Stream
  Responsebutton>
              </div>
         div>
     div>

     script>
          const chatMessages =
  document.getElementById('chat-messages');
          const userInput =
  document.getElementById('user-input');
          let isTyping = false;

          function addMessage(text, isUser = false, typing =
  false) {
              const messageDiv =
  document.createElement('div');
              messageDiv.className = `message ${isUser ?
  'user-message' : 'bot-message'}`;

              const messageContent =
  document.createElement('div');
              messageContent.innerHTML =p>${textp>`;

              if (typing) {
                  messageContent.innerHTML +=span
  class="typing-indicatorspan>`;
              }

              const metaDiv = document.createElement('div');
              metaDiv.className = 'message-meta';

              const time = document.createElement('span');
              time.textContent = `at ${new
  Date().toLocaleTimeString()}`;
              metaDiv.appendChild(time);

              messageDiv.appendChild(messageContent);
              messageDiv.appendChild(metaDiv);
              chatMessages.appendChild(messageDiv);
              chatMessages.scrollTop =
  chatMessages.scrollHeight;
          }

          function startTyping() {
              if (!isTyping) {
                  addMessage('Processing input...', false,
  true);
                  isTyping = true;
              }
          }

          function clearChat() {
              chatMessages.innerHTML = '';
              isTyping = false;
          }

          async function sendMessage() {
              if (!userInput.value) return;

              const userMessage = userInput.value;
              addMessage(userMessage, true);
              userInput.value = '';
              chatMessages.scrollTop =
  chatMessages.scrollHeight;

              // API call to OpenRouter
              try {
                  const response = await
  fetch('https://openrouter.ai/api/v1/chat/completions', {
                      method: 'POST',
                      headers: {
                          'Content-Type': 'application/json',
                          'Authorization': 'Bearer
  YOUR_API_KEY',
                      },
                      body: JSON.stringify({
                          model:
  "mistralai/mixtral-8x7b-instruct-v01",
                          messages: [{ role: "user", content:
  userMessage }]
                      })
                  });

                  const data = await response.json();
                  const botMessage = data.results[0].text;

                  // Clear typing indicator if present
                  const typingSpans =
  chatMessages.querySelectorAll('.typing-indicator');
                  typingSpans.forEach(span => span.remove());

                  addMessage(botMessage, false);
              } catch (error) {
                  addMessage('Error: Failed to get response
  from API', false, false);
                  console.error(error);
              }
          }

          userInput.addEventListener('keypress', (e) => {
              if (e.key === 'Enter') {
                  e.preventDefault();
                  sendMessage();
              }
          });

          document.getElementById('send-btn').addEventListener
  ('click', sendMessage);
      </script>
<html>
